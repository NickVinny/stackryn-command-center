<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Stackryn Command Center</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; }
body { font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; background: #0f1117; color: #e0e0e0; min-height: 100vh; }

header { background: #161822; border-bottom: 1px solid #2a2d3a; padding: 14px 24px; display: flex; align-items: center; justify-content: space-between; }
.logo h1 { font-size: 1.3rem; font-weight: 700; letter-spacing: .04em; color: #fff; }
.logo h1 span { color: #6FA184; }
.logo .subtitle { font-size: .75rem; color: #666; margin-top: 2px; }
.header-right { display: flex; align-items: center; gap: 16px; }
.header-right .clock { font-size: .78rem; color: #555; font-family: 'Cascadia Code', 'Fira Code', monospace; }
.header-right .clear-all { background: none; border: 1px solid #d6336344; color: #d63363; border-radius: 6px; padding: 5px 12px; font-size: .72rem; cursor: pointer; }
.header-right .clear-all:hover { background: #d6336322; }

/* Quick-add bar */
.quick-add { background: #161822; border-bottom: 1px solid #2a2d3a; padding: 12px 24px; display: flex; gap: 10px; align-items: center; }
.quick-add input { flex: 1; background: #1e2030; border: 1px solid #2a2d3a; border-radius: 8px; padding: 10px 14px; color: #e0e0e0; font-size: .88rem; outline: none; }
.quick-add input:focus { border-color: #6FA184; }
.quick-add input::placeholder { color: #555; }
.quick-add select { background: #1e2030; border: 1px solid #2a2d3a; border-radius: 8px; padding: 10px 12px; color: #aaa; font-size: .82rem; outline: none; cursor: pointer; }
.quick-add select:focus { border-color: #6FA184; }
.quick-add .add-btn { background: #6FA184; color: #fff; border: none; border-radius: 8px; padding: 10px 20px; font-size: .88rem; font-weight: 600; cursor: pointer; white-space: nowrap; }
.quick-add .add-btn:hover { background: #4F8665; }

/* Filter row */
.filters { padding: 12px 24px 0; display: flex; gap: 8px; align-items: center; }
.filters .f-btn { background: none; border: 1px solid #2a2d3a; color: #666; border-radius: 6px; padding: 5px 14px; font-size: .75rem; cursor: pointer; transition: all .15s; }
.filters .f-btn:hover { border-color: #6FA184; color: #6FA184; }
.filters .f-btn.active { border-color: #6FA184; color: #6FA184; background: #6FA18411; }
.filters .f-count { font-size: .68rem; color: #444; margin-left: auto; font-family: 'Cascadia Code', 'Fira Code', monospace; }

/* Card grid */
.board { padding: 16px 24px 24px; display: flex; flex-direction: column; gap: 8px; }

.card { background: #161822; border: 1px solid #2a2d3a; border-radius: 12px; padding: 0; transition: border-color .15s; overflow: hidden; }
.card:hover { border-color: #363a4a; }
.card.expanded .card-detail { display: flex; }
.card.has-questions { border-left: 3px solid #fdcb6e; }

.card-main { display: flex; align-items: center; gap: 12px; padding: 14px 16px; cursor: pointer; }
.card-status-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; cursor: pointer; transition: all .15s; border: 2px solid transparent; }
.card-status-dot:hover { transform: scale(1.3); }
.card-status-dot.running { background: #00b894; box-shadow: 0 0 6px #00b89466; }
.card-status-dot.paused { background: #fdcb6e; box-shadow: 0 0 6px #fdcb6e66; }
.card-status-dot.completed { background: #636e72; }
.card-status-dot.error { background: #d63363; box-shadow: 0 0 6px #d6336366; }

.card-info { flex: 1; min-width: 0; }
.card-name { font-size: .9rem; font-weight: 600; color: #e0e0e0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; display: flex; align-items: center; gap: 8px; }
.card-meta { font-size: .7rem; color: #555; margin-top: 2px; display: flex; gap: 10px; }
.card-meta .cat { color: #6FA184; }

.q-badge { background: #fdcb6e; color: #1a1a2e; font-size: .6rem; font-weight: 700; padding: 1px 7px; border-radius: 10px; flex-shrink: 0; animation: pulse-badge 2s infinite; }
@keyframes pulse-badge { 0%,100%{opacity:1} 50%{opacity:.5} }

.card-actions { display: flex; gap: 4px; align-items: center; flex-shrink: 0; }
.card-actions button { background: none; border: none; color: #555; cursor: pointer; padding: 4px 8px; border-radius: 4px; font-size: .82rem; transition: all .12s; }
.card-actions button:hover { background: #2a2d3a; color: #e0e0e0; }
.card-actions .btn-remove { color: #d6336366; }
.card-actions .btn-remove:hover { color: #d63363; background: #d6336322; }
.card-actions .status-badge { font-size: .62rem; padding: 2px 8px; border-radius: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: .04em; cursor: pointer; border: none; }
.status-badge.running { background: #00b89422; color: #00b894; }
.status-badge.paused { background: #fdcb6e22; color: #fdcb6e; }
.status-badge.completed { background: #636e7222; color: #636e72; }
.status-badge.error { background: #d6336322; color: #d63363; }

/* Card detail — chat thread */
.card-detail { display: none; flex-direction: column; border-top: 1px solid #2a2d3a; background: #12141e; max-height: 420px; }

.thread { flex: 1; overflow-y: auto; padding: 12px 16px; display: flex; flex-direction: column; gap: 8px; min-height: 80px; }
.thread-empty { font-size: .75rem; color: #333; padding: 20px 0; text-align: center; }

.msg { max-width: 85%; padding: 10px 14px; border-radius: 12px; font-size: .82rem; line-height: 1.5; word-wrap: break-word; position: relative; }
.msg .msg-time { font-size: .6rem; color: #555; margin-top: 4px; }
.msg .msg-copy { position: absolute; top: 4px; right: 6px; background: none; border: none; color: #555; cursor: pointer; font-size: .68rem; opacity: 0; transition: opacity .15s; padding: 2px 4px; }
.msg:hover .msg-copy { opacity: 1; }
.msg .msg-copy:hover { color: #fff; }

/* Question — left-aligned, darker */
.msg.question { align-self: flex-start; background: #1e2030; color: #e0e0e0; border-bottom-left-radius: 4px; border: 1px solid #2a2d3a; }
.msg.question .msg-label { font-size: .62rem; font-weight: 600; color: #fdcb6e; text-transform: uppercase; letter-spacing: .05em; margin-bottom: 4px; }
.msg.question.unanswered { border-color: #fdcb6e55; background: #fdcb6e08; }

/* Answer — right-aligned, purple */
.msg.answer { align-self: flex-end; background: #3D6B4F; color: #e8f0ec; border-bottom-right-radius: 4px; }
.msg.answer .msg-label { font-size: .62rem; font-weight: 600; color: #a8d4b8; text-transform: uppercase; letter-spacing: .05em; margin-bottom: 4px; }
.msg.answer .msg-time { color: #a8d4b888; }
.msg.answer .msg-copy:hover { color: #fff; }

/* Note — centered, muted */
.msg.note { align-self: center; background: #2a2d3a; color: #888; font-size: .75rem; border-radius: 8px; max-width: 90%; text-align: center; }
.msg.note .msg-label { font-size: .62rem; font-weight: 600; color: #636e72; text-transform: uppercase; letter-spacing: .05em; margin-bottom: 4px; }

/* Input bar */
.thread-input { padding: 10px 16px; border-top: 1px solid #2a2d3a; display: flex; gap: 6px; flex-shrink: 0; align-items: flex-end; }
.thread-input .type-btns { display: flex; flex-direction: column; gap: 4px; }
.thread-input .type-btn { background: #2a2d3a; color: #888; border: none; border-radius: 6px; padding: 4px 8px; font-size: .65rem; cursor: pointer; font-weight: 600; text-transform: uppercase; letter-spacing: .04em; white-space: nowrap; }
.thread-input .type-btn:hover { color: #e0e0e0; }
.thread-input .type-btn.active-q { background: #fdcb6e22; color: #fdcb6e; }
.thread-input .type-btn.active-a { background: #6FA18422; color: #6FA184; }
.thread-input .type-btn.active-n { background: #2a2d3a; color: #636e72; }
.thread-input textarea { flex: 1; background: #1e2030; border: 1px solid #2a2d3a; border-radius: 8px; padding: 9px 12px; color: #e0e0e0; font-size: .82rem; outline: none; font-family: inherit; resize: none; height: 38px; max-height: 120px; line-height: 1.4; }
.thread-input textarea:focus { border-color: #6FA184; }
.thread-input .send { background: #6FA184; color: #fff; border: none; border-radius: 8px; padding: 9px 14px; font-size: .95rem; cursor: pointer; line-height: 1; }
.thread-input .send:hover { background: #4F8665; }

/* Bottom actions row */
.card-bottom { padding: 6px 16px 10px; display: flex; gap: 6px; border-top: 1px solid #1a1c28; }
.card-bottom button { background: #1e2030; color: #666; border: none; border-radius: 6px; padding: 5px 10px; font-size: .68rem; cursor: pointer; }
.card-bottom button:hover { background: #2a2d3a; color: #aaa; }
.card-bottom .da-danger { color: #d63363; }
.card-bottom .da-danger:hover { background: #d6336322; }

/* Empty state */
.empty { padding: 60px 24px; text-align: center; color: #333; }
.empty .e-icon { font-size: 2.5rem; margin-bottom: 12px; opacity: .4; }
.empty .e-title { font-size: .95rem; color: #555; margin-bottom: 6px; }
.empty .e-sub { font-size: .78rem; color: #444; max-width: 400px; margin: 0 auto; line-height: 1.5; }

/* Stats bar */
.stats { background: #161822; border-top: 1px solid #2a2d3a; padding: 8px 24px; display: flex; gap: 24px; font-size: .72rem; color: #444; position: fixed; bottom: 0; left: 0; right: 0; }
.stats .sv { color: #888; font-weight: 600; }

/* Scrollbar */
::-webkit-scrollbar { width: 5px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: #2a2d3a; border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: #363a4a; }

/* Toast */
.toast { position: fixed; bottom: 48px; left: 50%; transform: translateX(-50%); background: #3D6B4F; color: #fff; padding: 8px 20px; border-radius: 8px; font-size: .8rem; font-weight: 600; opacity: 0; transition: opacity .3s; pointer-events: none; z-index: 200; }
.toast.show { opacity: 1; }
</style>
</head>
<body>

<header>
  <div class="logo">
    <h1><span>Stackryn</span> Command Center</h1>
    <div class="subtitle">Development Chat Management</div>
  </div>
  <div class="header-right">
    <span class="clock" id="clock"></span>
    <button class="clear-all" id="clear-all-btn">Clear All</button>
  </div>
</header>

<div class="quick-add">
  <input type="text" id="qa-name" placeholder="Chat name - type and hit Enter to add..." autofocus/>
  <select id="qa-cat">
    <option value="feature">Feature</option>
    <option value="bugfix">Bug Fix</option>
    <option value="migration">Migration</option>
    <option value="refactor">Refactor</option>
    <option value="infra">Infra</option>
    <option value="test">Test</option>
  </select>
  <button class="add-btn" id="qa-btn">+ Add Chat</button>
</div>

<div class="filters" id="filters">
  <button class="f-btn active" data-f="all">All</button>
  <button class="f-btn" data-f="running">Running</button>
  <button class="f-btn" data-f="paused">Paused</button>
  <button class="f-btn" data-f="completed">Done</button>
  <button class="f-btn" data-f="error">Error</button>
  <button class="f-btn" data-f="needs-answer" style="border-color:#fdcb6e44;color:#fdcb6e88;">Needs Answer</button>
  <span class="f-count" id="f-count"></span>
</div>

<div class="board" id="board"></div>

<div class="stats">
  <span>Total: <span class="sv" id="s-total">0</span></span>
  <span>Running: <span class="sv" id="s-run">0</span></span>
  <span>Needs Answer: <span class="sv" id="s-qa" style="color:#fdcb6e;">0</span></span>
  <span>Done: <span class="sv" id="s-done">0</span></span>
  <span>Messages: <span class="sv" id="s-entries">0</span></span>
</div>

<div class="toast" id="toast"></div>

<script>
var KEY = "stackryn_cc";
var chats = [];
var filter = "all";
var expandedId = null;

// Track which message type each card input is set to
var inputModes = {}; // cid -> "question" | "answer" | "note"

var STATUS_CYCLE = ["running", "paused", "completed", "error"];

function load() { try { chats = JSON.parse(localStorage.getItem(KEY)) || []; } catch(e) { chats = []; } }
function save() { localStorage.setItem(KEY, JSON.stringify(chats)); }
function gid() { return "c" + Date.now() + Math.random().toString(36).substr(2,4); }
function now() { return new Date().toISOString().slice(0,16).replace("T"," "); }
function time() { return new Date().toLocaleTimeString([],{hour:"2-digit",minute:"2-digit"}); }
function find(cid) { for(var i=0;i<chats.length;i++) if(chats[i].id===cid) return chats[i]; return null; }
function esc(s) { if(!s) return ""; var d=document.createElement("div"); d.textContent=s; return d.innerHTML; }

function toast(msg) {
  var t = document.getElementById("toast");
  t.textContent = msg;
  t.classList.add("show");
  clearTimeout(t._t);
  t._t = setTimeout(function(){ t.classList.remove("show"); }, 1800);
}

// Count unanswered questions for a chat
function unansweredCount(c) {
  if (!c.messages) return 0;
  var count = 0;
  for (var i = c.messages.length - 1; i >= 0; i--) {
    if (c.messages[i].type === "question") count++;
    else if (c.messages[i].type === "answer") break; // stop at last answer
  }
  return count;
}

// Migrate old log format to messages
function migrate(c) {
  if (!c.messages) {
    c.messages = [];
    if (c.log && c.log.length > 0) {
      c.log.forEach(function(l) {
        c.messages.push({ id: gid(), type: "note", text: "[" + l.tag + "] " + l.text, time: l.t });
      });
    }
  }
  return c;
}

// --- Add chat ---
function addChat(name, category) {
  if (!name) return;
  var c = { id: gid(), name: name, category: category || "feature", status: "running", created: now(), updated: now(), messages: [] };
  chats.unshift(c);
  save();
  expandedId = c.id;
  inputModes[c.id] = "question";
  render();
  toast("Added: " + name);
}

// --- Remove chat ---
function removeChat(cid) {
  chats = chats.filter(function(c){ return c.id !== cid; });
  if (expandedId === cid) expandedId = null;
  save();
  render();
  toast("Chat removed");
}

// --- Cycle status ---
function cycleStatus(cid) {
  var c = find(cid);
  if (!c) return;
  var i = STATUS_CYCLE.indexOf(c.status);
  c.status = STATUS_CYCLE[(i+1) % STATUS_CYCLE.length];
  c.updated = now();
  save();
  render();
}

// --- Add message ---
function addMessage(cid, type, text) {
  var c = find(cid);
  if (!c || !text) return;
  migrate(c);
  c.messages.push({ id: gid(), type: type, text: text, time: time() });
  c.updated = now();
  // Auto-switch: after adding a question, switch to answer mode. After answer, stay on answer.
  if (type === "question") inputModes[cid] = "answer";
  save();
  render();
}

// --- Delete single message ---
function deleteMessage(cid, mid) {
  var c = find(cid);
  if (!c || !c.messages) return;
  c.messages = c.messages.filter(function(m){ return m.id !== mid; });
  c.updated = now();
  save();
  render();
}

// --- Export ---
function exportChat(cid) {
  var c = find(cid);
  if (!c) return;
  migrate(c);
  var lines = ["# " + c.name, "Category: " + c.category, "Status: " + c.status, "Created: " + c.created, "Updated: " + c.updated, ""];
  c.messages.forEach(function(m) {
    var prefix = m.type === "question" ? "Q" : m.type === "answer" ? "A" : "N";
    lines.push("[" + m.time + "] [" + prefix + "] " + m.text);
  });
  var blob = new Blob([lines.join("\n")], {type:"text/markdown"});
  var a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = c.name.replace(/[^a-z0-9]/gi,"_").toLowerCase() + ".md";
  a.click();
  URL.revokeObjectURL(a.href);
}

// --- Copy text ---
function copyText(text) {
  navigator.clipboard.writeText(text).then(function(){ toast("Copied"); });
}

// --- Render ---
function render() {
  var board = document.getElementById("board");
  board.innerHTML = "";

  // Migrate all chats
  chats.forEach(function(c){ migrate(c); });

  var filtered = chats.filter(function(c) {
    if (filter === "needs-answer") return unansweredCount(c) > 0;
    return filter === "all" || c.status === filter;
  });

  document.getElementById("f-count").textContent = filtered.length + " / " + chats.length + " chats";

  if (filtered.length === 0) {
    board.innerHTML = '<div class="empty"><div class="e-icon">&#x1F680;</div><div class="e-title">' +
      (chats.length === 0 ? "No chats yet" : "No chats match this filter") +
      '</div><div class="e-sub">Type a chat name above and hit Enter. Then add questions from your chats and answer them all from here.</div></div>';
    updateStats();
    return;
  }

  filtered.forEach(function(c) {
    var uq = unansweredCount(c);
    var card = document.createElement("div");
    card.className = "card" + (expandedId === c.id ? " expanded" : "") + (uq > 0 ? " has-questions" : "");
    card.dataset.id = c.id;

    if (!inputModes[c.id]) inputModes[c.id] = "question";
    var mode = inputModes[c.id];

    var msgCount = c.messages ? c.messages.length : 0;

    // Main row
    var mainHTML =
      '<div class="card-main">' +
        '<div class="card-status-dot ' + c.status + '" title="Click to cycle status" data-action="cycle"></div>' +
        '<div class="card-info" data-action="toggle">' +
          '<div class="card-name">' + esc(c.name) + (uq > 0 ? ' <span class="q-badge">' + uq + ' Q</span>' : '') + '</div>' +
          '<div class="card-meta"><span class="cat">' + esc(c.category) + '</span><span>' + msgCount + ' msgs</span><span>' + esc(c.updated) + '</span></div>' +
        '</div>' +
        '<div class="card-actions">' +
          '<button class="status-badge ' + c.status + '" data-action="cycle" title="Click to change status">' + c.status + '</button>' +
          '<button data-action="export" title="Export">&#x1F4E5;</button>' +
          '<button class="btn-remove" data-action="remove" title="Remove chat">&#x2715;</button>' +
        '</div>' +
      '</div>';

    // Thread
    var threadHTML = '<div class="thread" id="thread-' + c.id + '">';
    if (!c.messages || c.messages.length === 0) {
      threadHTML += '<div class="thread-empty">No messages yet. Add a question from your chat session, then answer it here.</div>';
    } else {
      c.messages.forEach(function(m) {
        threadHTML +=
          '<div class="msg ' + m.type + (m.type === "question" && isUnanswered(c, m) ? " unanswered" : "") + '" data-mid="' + m.id + '">' +
            '<div class="msg-label">' + (m.type === "question" ? "Question" : m.type === "answer" ? "Your Answer" : "Note") + '</div>' +
            esc(m.text) +
            '<div class="msg-time">' + esc(m.time) + '</div>' +
            '<button class="msg-copy" data-action="copy-msg" title="Copy text">&#x1F4CB;</button>' +
          '</div>';
      });
    }
    threadHTML += '</div>';

    // Input bar
    var inputHTML =
      '<div class="thread-input">' +
        '<div class="type-btns">' +
          '<button class="type-btn' + (mode === "question" ? " active-q" : "") + '" data-action="set-mode" data-mode="question">Q</button>' +
          '<button class="type-btn' + (mode === "answer" ? " active-a" : "") + '" data-action="set-mode" data-mode="answer">A</button>' +
          '<button class="type-btn' + (mode === "note" ? " active-n" : "") + '" data-action="set-mode" data-mode="note">N</button>' +
        '</div>' +
        '<textarea data-action="msg-input" placeholder="' +
          (mode === "question" ? "Paste the question from this chat..." : mode === "answer" ? "Type your answer..." : "Add a note...") +
        '"></textarea>' +
        '<button class="send" data-action="msg-send">&#x27A4;</button>' +
      '</div>';

    // Bottom actions
    var bottomHTML =
      '<div class="card-bottom">' +
        '<button data-action="clear-thread">Clear Thread</button>' +
        '<button data-action="export">Export</button>' +
        '<button class="da-danger" data-action="remove">Remove</button>' +
      '</div>';

    card.innerHTML = mainHTML + '<div class="card-detail">' + threadHTML + inputHTML + bottomHTML + '</div>';
    board.appendChild(card);
  });

  // Event delegation
  board.onclick = function(e) {
    var btn = e.target.closest("[data-action]");
    if (!btn) return;
    var card = btn.closest(".card");
    if (!card) return;
    var cid = card.dataset.id;
    var action = btn.dataset.action;

    if (action === "cycle") cycleStatus(cid);
    else if (action === "toggle") { expandedId = (expandedId === cid) ? null : cid; render(); }
    else if (action === "remove") removeChat(cid);
    else if (action === "export") exportChat(cid);
    else if (action === "set-mode") {
      inputModes[cid] = btn.dataset.mode;
      render();
    }
    else if (action === "copy-msg") {
      var msgEl = btn.closest(".msg");
      if (msgEl) {
        var m = findMsg(cid, msgEl.dataset.mid);
        if (m) copyText(m.text);
      }
    }
    else if (action === "clear-thread") {
      var ch = find(cid);
      if (ch) { ch.messages = []; ch.updated = now(); save(); render(); toast("Thread cleared"); }
    }
    else if (action === "msg-send") {
      var ta = card.querySelector("[data-action='msg-input']");
      if (ta && ta.value.trim()) {
        addMessage(cid, inputModes[cid] || "question", ta.value.trim());
      }
    }
  };

  // Enter = send (Shift+Enter = newline)
  board.onkeydown = function(e) {
    if (e.key === "Enter" && !e.shiftKey) {
      var ta = e.target.closest("[data-action='msg-input']");
      if (ta) {
        e.preventDefault();
        var card = ta.closest(".card");
        if (card && ta.value.trim()) {
          addMessage(card.dataset.id, inputModes[card.dataset.id] || "question", ta.value.trim());
        }
      }
    }
  };

  // Auto-resize textareas
  board.oninput = function(e) {
    var ta = e.target.closest("[data-action='msg-input']");
    if (ta) { ta.style.height = "38px"; ta.style.height = Math.min(ta.scrollHeight, 120) + "px"; }
  };

  // Scroll thread to bottom and focus input
  if (expandedId) {
    var threadEl = document.getElementById("thread-" + expandedId);
    if (threadEl) threadEl.scrollTop = threadEl.scrollHeight;
    var ta = document.querySelector(".card.expanded [data-action='msg-input']");
    if (ta) ta.focus();
  }

  updateStats();
}

function findMsg(cid, mid) {
  var c = find(cid);
  if (!c || !c.messages) return null;
  for (var i = 0; i < c.messages.length; i++) {
    if (c.messages[i].id === mid) return c.messages[i];
  }
  return null;
}

function isUnanswered(c, m) {
  if (m.type !== "question") return false;
  var idx = -1;
  for (var i = 0; i < c.messages.length; i++) {
    if (c.messages[i].id === m.id) { idx = i; break; }
  }
  // Check if any answer exists after this question
  for (var j = idx + 1; j < c.messages.length; j++) {
    if (c.messages[j].type === "answer") return false;
  }
  return true;
}

function updateStats() {
  var r=0, qa=0, d=0, e=0;
  chats.forEach(function(c) {
    migrate(c);
    if(c.status==="running") r++;
    if(c.status==="completed") d++;
    if(unansweredCount(c) > 0) qa++;
    e += c.messages ? c.messages.length : 0;
  });
  document.getElementById("s-total").textContent = chats.length;
  document.getElementById("s-run").textContent = r;
  document.getElementById("s-qa").textContent = qa;
  document.getElementById("s-done").textContent = d;
  document.getElementById("s-entries").textContent = e;
}

// --- Quick add bar ---
document.getElementById("qa-btn").onclick = function() {
  var inp = document.getElementById("qa-name");
  addChat(inp.value.trim(), document.getElementById("qa-cat").value);
  inp.value = "";
  inp.focus();
};
document.getElementById("qa-name").onkeydown = function(e) {
  if (e.key === "Enter") { e.preventDefault(); addChat(this.value.trim(), document.getElementById("qa-cat").value); this.value = ""; }
};

// --- Filters ---
document.getElementById("filters").onclick = function(e) {
  var btn = e.target.closest(".f-btn");
  if (!btn) return;
  document.querySelectorAll(".f-btn").forEach(function(b){ b.classList.remove("active"); });
  btn.classList.add("active");
  filter = btn.dataset.f;
  render();
};

// --- Clear all ---
document.getElementById("clear-all-btn").onclick = function() {
  if (!confirm("Remove ALL chats? This cannot be undone.")) return;
  chats = []; expandedId = null; save(); render(); toast("All chats cleared");
};

// --- Clock ---
function tick() { document.getElementById("clock").textContent = new Date().toLocaleTimeString([],{hour:"2-digit",minute:"2-digit",second:"2-digit"}); }
setInterval(tick, 1000); tick();

// --- Keyboard shortcuts ---
document.addEventListener("keydown", function(e) {
  if (e.ctrlKey && e.key === "n") { e.preventDefault(); document.getElementById("qa-name").focus(); }
});

// --- Init ---
load();
render();
</script>

</body>
