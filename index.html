<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Stackryn Command Center</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden}
body{font-family:'Segoe UI',system-ui,sans-serif;background:#0f1117;color:#e0e0e0;display:flex;flex-direction:column;height:100vh}

/* Header */
header{background:#161822;border-bottom:1px solid #2a2d3a;padding:8px 16px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.logo h1{font-size:1.1rem;font-weight:700;color:#fff;letter-spacing:.04em}
.logo h1 span{color:#6FA184}
.header-right{display:flex;align-items:center;gap:12px}
.header-right .clock{font-size:.72rem;color:#555;font-family:'Cascadia Code','Fira Code',monospace}
.live-label{font-size:.68rem;color:#666;cursor:pointer;display:flex;align-items:center;gap:5px;padding:3px 8px;border:1px solid #2a2d3a;border-radius:5px}
.live-label:hover{border-color:#6FA184;color:#aaa}
.live-dot{width:7px;height:7px;border-radius:50%;display:inline-block}
.live-dot.connected{background:#00b894;animation:plive 2s infinite}
.live-dot.disconnected{background:#d63363}
.live-dot.off{background:#555}
@keyframes plive{0%,100%{opacity:1}50%{opacity:.4}}
.hdr-btn{background:none;border:1px solid #2a2d3a;color:#666;border-radius:5px;padding:3px 10px;font-size:.68rem;cursor:pointer}
.hdr-btn:hover{border-color:#6FA184;color:#aaa}
.hdr-btn.danger{border-color:#d6336344;color:#d63363}
.hdr-btn.danger:hover{background:#d6336322}

/* Quick-add */
.quick-add{background:#161822;border-bottom:1px solid #2a2d3a;padding:6px 16px;display:flex;gap:8px;align-items:center;flex-shrink:0}
.quick-add input{flex:1;background:#1e2030;border:1px solid #2a2d3a;border-radius:6px;padding:7px 10px;color:#e0e0e0;font-size:.8rem;outline:none}
.quick-add input:focus{border-color:#6FA184}
.quick-add input::placeholder{color:#444}
.quick-add select{background:#1e2030;border:1px solid #2a2d3a;border-radius:6px;padding:7px 8px;color:#888;font-size:.75rem;outline:none;cursor:pointer}
.quick-add .add-btn{background:#6FA184;color:#fff;border:none;border-radius:6px;padding:7px 14px;font-size:.78rem;font-weight:600;cursor:pointer}
.quick-add .add-btn:hover{background:#4F8665}
.quick-add .human-mult{background:#1e2030;border:1px solid #2a2d3a;border-radius:6px;padding:7px 8px;color:#888;font-size:.75rem;outline:none;width:52px;text-align:center}
.quick-add .human-mult:focus{border-color:#6FA184}
.quick-add label{font-size:.68rem;color:#555;white-space:nowrap}

/* Grid */
.grid-wrap{flex:1;overflow-y:auto;padding:8px 12px;min-height:0}
.grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;min-height:0}
@media(max-width:1200px){.grid{grid-template-columns:repeat(2,1fr)}}
@media(max-width:700px){.grid{grid-template-columns:1fr}}

/* Card */
.card{background:#161822;border:1px solid #2a2d3a;border-radius:10px;display:flex;flex-direction:column;min-height:0;max-height:calc((100vh - 240px)/3);overflow:hidden;transition:border-color .15s}
.card:hover{border-color:#363a4a}
.card.has-q{border-left:3px solid #fdcb6e}
@keyframes flashin{0%{background:#fdcb6e22}100%{background:transparent}}
.card.flash-in{animation:flashin 1.5s ease-out}

.card-hdr{display:flex;align-items:center;gap:8px;padding:8px 10px;flex-shrink:0;cursor:default}
.c-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;cursor:pointer;transition:transform .12s}
.c-dot:hover{transform:scale(1.4)}
.c-dot.running{background:#00b894;box-shadow:0 0 5px #00b89466}
.c-dot.paused{background:#fdcb6e;box-shadow:0 0 5px #fdcb6e66}
.c-dot.completed{background:#636e72}
.c-dot.error{background:#d63363;box-shadow:0 0 5px #d6336366}
.c-name{flex:1;font-size:.78rem;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;display:flex;align-items:center;gap:6px}
.q-badge{background:#fdcb6e;color:#1a1a2e;font-size:.55rem;font-weight:700;padding:1px 6px;border-radius:8px;animation:pbadge 2s infinite}
@keyframes pbadge{0%,100%{opacity:1}50%{opacity:.5}}
.c-time{font-size:.6rem;color:#444;font-family:'Cascadia Code',monospace}
.c-acts button{background:none;border:none;color:#444;cursor:pointer;padding:2px 4px;font-size:.72rem;border-radius:3px}
.c-acts button:hover{color:#e0e0e0;background:#2a2d3a}
.c-acts .rm{color:#d6336355}
.c-acts .rm:hover{color:#d63363;background:#d6336322}

/* Thread */
.thread{flex:1;overflow-y:auto;padding:6px 8px;display:flex;flex-direction:column;gap:5px;min-height:0}
.thread-empty{font-size:.68rem;color:#2a2d3a;text-align:center;padding:12px 0}
.msg{max-width:90%;padding:6px 10px;border-radius:8px;font-size:.72rem;line-height:1.45;word-wrap:break-word;position:relative}
.msg .mt{font-size:.55rem;color:#444;margin-top:2px}
.msg .mc{position:absolute;top:2px;right:4px;background:none;border:none;color:#444;cursor:pointer;font-size:.6rem;opacity:0;padding:1px 3px}
.msg:hover .mc{opacity:1}
.msg.question{align-self:flex-start;background:#1e2030;color:#ddd;border:1px solid #2a2d3a;border-bottom-left-radius:3px}
.msg.question.unanswered{border-color:#fdcb6e44;background:#fdcb6e08}
.msg.question .ml{font-size:.55rem;font-weight:600;color:#fdcb6e;margin-bottom:2px}
.msg.answer{align-self:flex-end;background:#3D6B4F;color:#e8f0ec;border-bottom-right-radius:3px}
.msg.answer .ml{font-size:.55rem;font-weight:600;color:#a8d4b8;margin-bottom:2px}
.msg.answer .mt{color:#a8d4b866}
.msg.note{align-self:center;background:#2a2d3a;color:#777;font-size:.68rem;border-radius:6px;max-width:95%;text-align:center}

/* Input */
.t-input{padding:6px 8px;border-top:1px solid #2a2d3a;display:flex;gap:4px;flex-shrink:0;align-items:flex-end}
.t-modes{display:flex;flex-direction:column;gap:2px}
.t-mode{background:#2a2d3a;color:#666;border:none;border-radius:4px;padding:2px 5px;font-size:.58rem;cursor:pointer;font-weight:700}
.t-mode:hover{color:#ccc}
.t-mode.aq{background:#fdcb6e22;color:#fdcb6e}
.t-mode.aa{background:#6FA18422;color:#6FA184}
.t-mode.an{background:#2a2d3a;color:#555}
.t-input textarea{flex:1;background:#1e2030;border:1px solid #2a2d3a;border-radius:6px;padding:6px 8px;color:#e0e0e0;font-size:.75rem;outline:none;font-family:inherit;resize:none;height:30px;max-height:80px;line-height:1.3}
.t-input textarea:focus{border-color:#6FA184}
.t-input .snd{background:#6FA184;color:#fff;border:none;border-radius:6px;padding:6px 10px;font-size:.82rem;cursor:pointer;line-height:1}
.t-input .snd:hover{background:#4F8665}

/* Metrics dashboard */
.metrics{background:#161822;border-top:1px solid #2a2d3a;padding:10px 16px;flex-shrink:0;display:flex;gap:0;overflow-x:auto}
.m-section{min-width:0;padding:0 14px;border-right:1px solid #2a2d3a}
.m-section:last-child{border-right:none}
.m-section.summary{flex:0 0 auto;min-width:220px}
.m-section.breakdown{flex:1}
.m-title{font-size:.62rem;color:#555;text-transform:uppercase;letter-spacing:.06em;font-weight:600;margin-bottom:6px}
.m-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:3px}
.m-label{font-size:.7rem;color:#888}
.m-val{font-size:.82rem;font-weight:700;color:#e0e0e0;font-family:'Cascadia Code',monospace}
.m-val.green{color:#6FA184}
.m-val.yellow{color:#fdcb6e}
.m-val.dim{color:#555}
.m-sub{font-size:.58rem;color:#444;margin-top:2px}
.m-table{width:100%;border-collapse:collapse}
.m-table th{font-size:.58rem;color:#555;text-transform:uppercase;letter-spacing:.04em;font-weight:600;text-align:left;padding:0 6px 4px 0;border-bottom:1px solid #2a2d3a}
.m-table th:not(:first-child){text-align:right}
.m-table td{font-size:.7rem;padding:3px 6px 3px 0;border-bottom:1px solid #1e2030}
.m-table td:not(:first-child){text-align:right;font-family:'Cascadia Code',monospace;font-size:.68rem}
.m-table .t-name{color:#aaa;max-width:140px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.m-table .t-yours{color:#e0e0e0;font-weight:600}
.m-table .t-human{color:#6FA184}
.m-table .t-total{color:#fdcb6e;font-weight:700;border-top:1px solid #2a2d3a;border-bottom:none;padding-top:5px}

/* Config panel */
.config-panel{display:none;position:fixed;top:44px;right:12px;background:#1e2030;border:1px solid #2a2d3a;border-radius:10px;padding:16px;z-index:150;width:380px;box-shadow:0 8px 32px #0008}
.config-panel.open{display:block}
.config-panel h3{font-size:.88rem;margin-bottom:10px;color:#e0e0e0}
.config-panel label{display:block;font-size:.7rem;color:#888;margin-bottom:3px;margin-top:8px}
.config-panel input{width:100%;background:#161822;border:1px solid #2a2d3a;border-radius:5px;padding:6px 8px;color:#e0e0e0;font-size:.78rem;outline:none;font-family:'Cascadia Code',monospace}
.config-panel input:focus{border-color:#6FA184}
.config-panel .cfg-row{display:flex;gap:6px;margin-top:10px}
.config-panel .cfg-row button{padding:6px 14px;border-radius:5px;border:none;font-size:.75rem;cursor:pointer;font-weight:600}
.cfg-save{background:#6FA184;color:#fff}
.cfg-save:hover{background:#4F8665}
.cfg-cancel{background:#2a2d3a;color:#aaa}
.cfg-cancel:hover{background:#363a4a}
.helper-box{background:#161822;border:1px solid #2a2d3a;border-radius:5px;padding:8px;margin-top:6px;font-family:'Cascadia Code',monospace;font-size:.65rem;color:#6FA184;line-height:1.5;cursor:pointer;word-break:break-all;position:relative}
.helper-box:hover{border-color:#6FA184}
.helper-box .ch{position:absolute;top:3px;right:6px;font-size:.55rem;color:#444}
.helper-note{font-size:.62rem;color:#444;margin-top:4px}

/* Empty */
.empty{grid-column:1/-1;padding:40px;text-align:center;color:#333}
.empty .ei{font-size:2rem;margin-bottom:8px;opacity:.4}
.empty .et{font-size:.88rem;color:#555}

/* Toast */
.toast{position:fixed;bottom:12px;left:50%;transform:translateX(-50%);background:#3D6B4F;color:#fff;padding:6px 16px;border-radius:6px;font-size:.75rem;font-weight:600;opacity:0;transition:opacity .3s;pointer-events:none;z-index:200}
.toast.show{opacity:1}

/* Scrollbar */
::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:#2a2d3a;border-radius:2px}
::-webkit-scrollbar-thumb:hover{background:#363a4a}
</style>
</head>
<body>

<header>
  <div class="logo"><h1><span>Stackryn</span> Command Center</h1></div>
  <div class="header-right">
    <div class="live-label" id="live-toggle" title="Configure live feed">
      <span class="live-dot off" id="live-dot"></span>
      <span id="live-text">Feed Off</span>
    </div>
    <span class="clock" id="clock"></span>
    <button class="hdr-btn danger" id="clear-all-btn">Clear All</button>
  </div>
</header>

<div class="config-panel" id="config-panel">
  <h3>Live Feed</h3>
  <label>ntfy.sh Topic</label>
  <input type="text" id="cfg-topic" value="stackryn-cc-nick"/>
  <label style="margin-top:10px">Push from terminal:</label>
  <div class="helper-box" id="helper-cmd"><span class="ch">copy</span>curl -d "ChatName|Question" ntfy.sh/<span id="helper-topic">stackryn-cc-nick</span></div>
  <div class="cfg-row">
    <button class="cfg-cancel" id="cfg-cancel">Cancel</button>
    <button class="cfg-save" id="cfg-save">Save &amp; Connect</button>
  </div>
</div>

<div class="quick-add">
  <input type="text" id="qa-name" placeholder="Add agent chat..." autofocus/>
  <select id="qa-cat">
    <option value="feature">Feature</option>
    <option value="bugfix">Bug Fix</option>
    <option value="migration">Migration</option>
    <option value="refactor">Refactor</option>
    <option value="infra">Infra</option>
    <option value="test">Test</option>
  </select>
  <label>Human est.</label>
  <input class="human-mult" type="number" id="qa-human" value="8" min="1" max="200" title="Estimated human-equivalent hours for this work"/>
  <label>hrs</label>
  <button class="add-btn" id="qa-btn">+ Add</button>
</div>

<div class="grid-wrap">
  <div class="grid" id="grid"></div>
</div>

<div class="metrics" id="metrics"></div>

<div class="toast" id="toast"></div>

<script>
var KEY="stackryn_cc",MKEY="stackryn_cc_metrics";
var chats=[],filter="all",expandedId=null,inputModes={};
var STATUS_CYCLE=["running","paused","completed","error"];
var dayMetrics={date:"",moved_review:0,moved_done:0,session_start:null,total_work_ms:0,working:false};

function load(){try{chats=JSON.parse(localStorage.getItem(KEY))||[]}catch(e){chats=[]}}
function save(){localStorage.setItem(KEY,JSON.stringify(chats))}
function loadMetrics(){try{var m=JSON.parse(localStorage.getItem(MKEY));if(m&&m.date===todayStr())dayMetrics=m;else resetMetrics()}catch(e){resetMetrics()}}
function saveMetrics(){dayMetrics.date=todayStr();localStorage.setItem(MKEY,JSON.stringify(dayMetrics))}
function resetMetrics(){dayMetrics={date:todayStr(),moved_review:0,moved_done:0,session_start:null,total_work_ms:0,working:false};saveMetrics()}
function todayStr(){return new Date().toLocaleDateString("en-CA",{timeZone:"America/New_York"})}
function gid(){return"c"+Date.now()+Math.random().toString(36).substr(2,4)}
function now(){return new Date().toISOString().slice(0,16).replace("T"," ")}
function time(){return new Date().toLocaleTimeString([],{hour:"2-digit",minute:"2-digit"})}
function find(id){for(var i=0;i<chats.length;i++)if(chats[i].id===id)return chats[i];return null}
function esc(s){if(!s)return"";var d=document.createElement("div");d.textContent=s;return d.innerHTML}
function fmtMs(ms){if(ms<0)ms=0;var h=Math.floor(ms/3600000),m=Math.floor((ms%3600000)/60000);return h+"h "+m+"m"}
function fmtHrs(h){if(h<0)h=0;var totalMin=Math.round(h*60);var hh=Math.floor(totalMin/60),mm=totalMin%60;return hh+"h "+mm+"m"}

function toast(msg){var t=document.getElementById("toast");t.textContent=msg;t.classList.add("show");clearTimeout(t._t);t._t=setTimeout(function(){t.classList.remove("show")},1800)}

// --- Work timer: time since midnight EST ---
function midnightEST(){var d=new Date();var est=new Date(d.toLocaleString("en-US",{timeZone:"America/New_York"}));est.setHours(0,0,0,0);var diff=d-est;return diff>0?diff:0}
function currentWorkMs(){return midnightEST()}
function checkAutoTimer(){}

function unansweredCount(c){if(!c.messages)return 0;var n=0;for(var i=c.messages.length-1;i>=0;i--){if(c.messages[i].type==="question")n++;else if(c.messages[i].type==="answer")break}return n}
function migrate(c){if(!c.messages){c.messages=[];if(c.log)c.log.forEach(function(l){c.messages.push({id:gid(),type:"note",text:"["+l.tag+"] "+l.text,time:l.t})})}if(!c.humanHrs)c.humanHrs=8;return c}

function addChat(name,cat,humanHrs){
  if(!name)return;
  var c={id:gid(),name:name,category:cat||"feature",status:"running",created:now(),updated:now(),messages:[],humanHrs:humanHrs||8,startedAt:Date.now()};
  chats.unshift(c);save();inputModes[c.id]="question";render();toast("Added: "+name);checkAutoTimer()
}
function removeChat(cid){chats=chats.filter(function(c){return c.id!==cid});if(expandedId===cid)expandedId=null;save();render();toast("Removed");checkAutoTimer()}
function cycleStatus(cid){
  var c=find(cid);if(!c)return;
  var old=c.status,i=STATUS_CYCLE.indexOf(old);
  c.status=STATUS_CYCLE[(i+1)%STATUS_CYCLE.length];c.updated=now();
  // Track transitions
  if(old==="running"&&c.status==="paused"){dayMetrics.moved_review++;saveMetrics()}
  if(old==="paused"&&c.status==="completed"){dayMetrics.moved_done++;c.completedAt=Date.now();saveMetrics()}
  save();render();checkAutoTimer()
}
function addMessage(cid,type,text){var c=find(cid);if(!c||!text)return;migrate(c);c.messages.push({id:gid(),type:type,text:text,time:time()});c.updated=now();if(type==="question")inputModes[cid]="answer";save();render()}
function exportChat(cid){var c=find(cid);if(!c)return;migrate(c);var lines=["# "+c.name,"Status: "+c.status,"Created: "+c.created,"Human Est: "+c.humanHrs+"h",""];c.messages.forEach(function(m){lines.push("["+(m.type==="question"?"Q":m.type==="answer"?"A":"N")+"] "+m.text)});var b=new Blob([lines.join("\n")],{type:"text/markdown"});var a=document.createElement("a");a.href=URL.createObjectURL(b);a.download=c.name.replace(/[^a-z0-9]/gi,"_").toLowerCase()+".md";a.click();URL.revokeObjectURL(a.href)}
function copyText(t){navigator.clipboard.writeText(t).then(function(){toast("Copied")})}
function isUnanswered(c,m){if(m.type!=="question")return false;var idx=-1;for(var i=0;i<c.messages.length;i++)if(c.messages[i].id===m.id){idx=i;break}for(var j=idx+1;j<c.messages.length;j++)if(c.messages[j].type==="answer")return false;return true}

// --- Render grid ---
function render(){
  var grid=document.getElementById("grid");grid.innerHTML="";
  chats.forEach(function(c){migrate(c)});

  if(chats.length===0){grid.innerHTML='<div class="empty"><div class="ei">&#x1F680;</div><div class="et">Add agent chats above. Cards fill a 3x3 grid.</div></div>';renderMetrics();return}

  chats.forEach(function(c){
    var uq=unansweredCount(c);
    if(!inputModes[c.id])inputModes[c.id]="question";
    var mode=inputModes[c.id];
    var card=document.createElement("div");
    card.className="card"+(uq>0?" has-q":"");
    card.dataset.id=c.id;

    // Elapsed time for this agent
    var startT=c.startedAt||new Date(c.created).getTime();
    var endT=c.completedAt||Date.now();
    var elapsed=Math.max(0,endT-startT);
    var elapsedHrs=elapsed/3600000;
    var ratio=c.humanHrs/Math.max(elapsedHrs,0.01);

    var lastMsg=c.messages.length>0?c.messages[c.messages.length-1]:null;
    var lastText=lastMsg?(lastMsg.text.length>60?lastMsg.text.slice(0,60)+"...":lastMsg.text):"No messages";

    // Header
    var hdr='<div class="card-hdr">'+
      '<div class="c-dot '+c.status+'" data-action="cycle" title="Cycle status"></div>'+
      '<div class="c-name">'+esc(c.name)+(uq>0?' <span class="q-badge">'+uq+'</span>':'')+'</div>'+
      '<span class="c-time">'+fmtMs(elapsed)+'</span>'+
      '<div class="c-acts">'+
        '<button data-action="export" title="Export">&#x2B07;</button>'+
        '<button class="rm" data-action="remove" title="Remove">&#x2715;</button>'+
      '</div></div>';

    // Thread
    var thread='<div class="thread" id="th-'+c.id+'">';
    if(!c.messages||c.messages.length===0){thread+='<div class="thread-empty">Waiting for activity...</div>'}
    else{c.messages.forEach(function(m){
      thread+='<div class="msg '+m.type+(m.type==="question"&&isUnanswered(c,m)?" unanswered":"")+'" data-mid="'+m.id+'">'+
        '<div class="ml">'+(m.type==="question"?"Q":m.type==="answer"?"A":"N")+'</div>'+
        esc(m.text)+
        '<div class="mt">'+esc(m.time)+'</div>'+
        '<button class="mc" data-action="copy-msg">&#x1F4CB;</button></div>'
    })}
    thread+='</div>';

    // Input
    var inp='<div class="t-input">'+
      '<div class="t-modes">'+
        '<button class="t-mode'+(mode==="question"?" aq":"")+'" data-action="set-mode" data-mode="question">Q</button>'+
        '<button class="t-mode'+(mode==="answer"?" aa":"")+'" data-action="set-mode" data-mode="answer">A</button>'+
        '<button class="t-mode'+(mode==="note"?" an":"")+'" data-action="set-mode" data-mode="note">N</button>'+
      '</div>'+
      '<textarea data-action="msg-input" placeholder="'+(mode==="question"?"Paste question...":mode==="answer"?"Your answer...":"Note...")+'"></textarea>'+
      '<button class="snd" data-action="msg-send">&#x27A4;</button></div>';

    card.innerHTML=hdr+thread+inp;
    grid.appendChild(card);
  });

  // Delegation
  grid.onclick=function(e){
    var btn=e.target.closest("[data-action]");if(!btn)return;
    var card=btn.closest(".card");if(!card)return;
    var cid=card.dataset.id,action=btn.dataset.action;
    if(action==="cycle")cycleStatus(cid);
    else if(action==="remove")removeChat(cid);
    else if(action==="export")exportChat(cid);
    else if(action==="set-mode"){inputModes[cid]=btn.dataset.mode;render()}
    else if(action==="copy-msg"){var mel=btn.closest(".msg");if(mel){var c=find(cid);if(c){for(var i=0;i<c.messages.length;i++)if(c.messages[i].id===mel.dataset.mid){copyText(c.messages[i].text);break}}}}
    else if(action==="msg-send"){var ta=card.querySelector("[data-action='msg-input']");if(ta&&ta.value.trim())addMessage(cid,inputModes[cid]||"question",ta.value.trim())}
  };
  grid.onkeydown=function(e){if(e.key==="Enter"&&!e.shiftKey){var ta=e.target.closest("[data-action='msg-input']");if(ta){e.preventDefault();var card=ta.closest(".card");if(card&&ta.value.trim())addMessage(card.dataset.id,inputModes[card.dataset.id]||"question",ta.value.trim())}}};
  grid.oninput=function(e){var ta=e.target.closest("[data-action='msg-input']");if(ta){ta.style.height="30px";ta.style.height=Math.min(ta.scrollHeight,80)+"px"}};

  // Scroll threads to bottom
  chats.forEach(function(c){var el=document.getElementById("th-"+c.id);if(el)el.scrollTop=el.scrollHeight});

  renderMetrics();
}

// --- Metrics dashboard ---
function renderMetrics(){
  var el=document.getElementById("metrics");
  var totalAgents=chats.length;
  var agentData=[];
  var totalUQ=0;

  chats.forEach(function(c){
    migrate(c);
    totalUQ+=unansweredCount(c);
    var startT=c.startedAt||new Date(c.created).getTime();
    var endT=c.completedAt||Date.now();
    var elapsedMs=Math.max(0,endT-startT);
    var elapsedHrs=elapsedMs/3600000;
    var humanHrs=c.humanHrs||8;
    agentData.push({name:c.name,status:c.status,elapsedMs:elapsedMs,elapsedHrs:elapsedHrs,humanHrs:humanHrs});
  });

  var workMs=currentWorkMs();
  var totalHumanHrs=0,totalAgentHrs=0;
  agentData.forEach(function(a){totalHumanHrs+=a.humanHrs;totalAgentHrs+=a.elapsedHrs});

  // Section 1: Your Day summary
  var s1='<div class="m-section summary"><div class="m-title">Your Day (resets midnight EST)</div>'+
    '<div class="m-row"><span class="m-label">Chats</span><span class="m-val">'+totalAgents+'</span></div>'+
    '<div class="m-row"><span class="m-label">Your Time</span><span class="m-val">'+fmtMs(workMs)+'</span></div>'+
    '<div class="m-row"><span class="m-label">Total Agent Time</span><span class="m-val">'+fmtHrs(totalAgentHrs)+'</span></div>'+
    '<div class="m-row"><span class="m-label">Human Equivalent</span><span class="m-val green">'+fmtHrs(totalHumanHrs)+'</span></div>'+
    (totalUQ>0?'<div class="m-row"><span class="m-label">Needs Answer</span><span class="m-val yellow">'+totalUQ+'</span></div>':'')+
    '</div>';

  // Section 2: Per-chat breakdown table
  var s2='<div class="m-section breakdown"><div class="m-title">Time Per Chat</div>';
  if(agentData.length===0){s2+='<div style="font-size:.65rem;color:#333">No chats yet</div>'}
  else{
    s2+='<table class="m-table"><thead><tr><th>Chat</th><th>Agent Time</th><th>Human Est.</th></tr></thead><tbody>';
    agentData.forEach(function(a){
      var dot=a.status==="running"?'color:#00b894':a.status==="completed"?'color:#636e72':'color:#fdcb6e';
      s2+='<tr><td class="t-name" style="'+dot+'">'+esc(a.name)+'</td>'+
        '<td class="t-yours">'+fmtHrs(a.elapsedHrs)+'</td>'+
        '<td class="t-human">'+fmtHrs(a.humanHrs)+'</td></tr>';
    });
    s2+='<tr><td class="t-total">Total</td>'+
      '<td class="t-total t-yours">'+fmtHrs(totalAgentHrs)+'</td>'+
      '<td class="t-total t-human">'+fmtHrs(totalHumanHrs)+'</td></tr>';
    s2+='</tbody></table>';
  }
  s2+='</div>';

  el.innerHTML=s1+s2;
}

// --- Quick add ---
document.getElementById("qa-btn").onclick=function(){var inp=document.getElementById("qa-name"),h=parseFloat(document.getElementById("qa-human").value)||8;addChat(inp.value.trim(),document.getElementById("qa-cat").value,h);inp.value="";inp.focus()};
document.getElementById("qa-name").onkeydown=function(e){if(e.key==="Enter"){e.preventDefault();var h=parseFloat(document.getElementById("qa-human").value)||8;addChat(this.value.trim(),document.getElementById("qa-cat").value,h);this.value=""}};

// --- Clear all ---
document.getElementById("clear-all-btn").onclick=function(){if(!confirm("Remove ALL chats?"))return;chats=[];expandedId=null;save();resetMetrics();render();toast("Cleared")};

// --- Clock + metrics refresh ---
function tick(){document.getElementById("clock").textContent=new Date().toLocaleTimeString([],{hour:"2-digit",minute:"2-digit",second:"2-digit"})}
setInterval(tick,1000);tick();
setInterval(renderMetrics,15000); // refresh metrics every 15s

// --- Keyboard ---
document.addEventListener("keydown",function(e){if(e.ctrlKey&&e.key==="n"){e.preventDefault();document.getElementById("qa-name").focus()}});

// =============================================
// LIVE FEED
// =============================================
var NTFY_KEY="stackryn_cc_ntfy",ntfyTopic="",evtSource=null;
function loadNtfy(){ntfyTopic=localStorage.getItem(NTFY_KEY)||""}
function saveNtfy(){localStorage.setItem(NTFY_KEY,ntfyTopic)}
function updateLiveUI(){var d=document.getElementById("live-dot"),t=document.getElementById("live-text");if(!ntfyTopic){d.className="live-dot off";t.textContent="Feed Off"}else if(evtSource&&evtSource.readyState===EventSource.OPEN){d.className="live-dot connected";t.textContent="Live"}else if(evtSource&&evtSource.readyState===EventSource.CONNECTING){d.className="live-dot disconnected";t.textContent="Connecting..."}else{d.className="live-dot disconnected";t.textContent="Disconnected"}}
function connectNtfy(){disconnectNtfy();if(!ntfyTopic){updateLiveUI();return}evtSource=new EventSource("https://ntfy.sh/"+encodeURIComponent(ntfyTopic)+"/sse");evtSource.onopen=function(){updateLiveUI();toast("Live feed connected")};evtSource.onerror=function(){updateLiveUI()};evtSource.onmessage=function(evt){try{var data=JSON.parse(evt.data);if(data.event!=="message")return;handleIncoming(data.message||"")}catch(e){}};updateLiveUI()}
function disconnectNtfy(){if(evtSource){evtSource.close();evtSource=null}updateLiveUI()}
function handleIncoming(raw){var parts=raw.split("|"),chatName,qText;if(parts.length>=2){chatName=parts[0].trim();qText=parts.slice(1).join("|").trim()}else{chatName=null;qText=raw.trim()}if(!qText)return;var target=null;if(chatName){var lower=chatName.toLowerCase();for(var i=0;i<chats.length;i++)if(chats[i].name.toLowerCase()===lower){target=chats[i];break}if(!target)for(var i=0;i<chats.length;i++)if(chats[i].name.toLowerCase().indexOf(lower)!==-1){target=chats[i];break}if(!target){target={id:gid(),name:chatName,category:"feature",status:"running",created:now(),updated:now(),messages:[],humanHrs:8,startedAt:Date.now()};chats.unshift(target)}}else{for(var i=0;i<chats.length;i++)if(chats[i].status==="running"){target=chats[i];break}if(!target){target={id:gid(),name:"Incoming",category:"feature",status:"running",created:now(),updated:now(),messages:[],humanHrs:8,startedAt:Date.now()};chats.unshift(target)}}migrate(target);target.messages.push({id:gid(),type:"question",text:qText,time:time()});target.updated=now();inputModes[target.id]="answer";save();render();toast("New Q: "+target.name);checkAutoTimer();try{var ctx=new(window.AudioContext||window.webkitAudioContext)(),osc=ctx.createOscillator(),g=ctx.createGain();osc.connect(g);g.connect(ctx.destination);osc.frequency.value=880;osc.type="sine";g.gain.value=.15;osc.start();g.gain.exponentialRampToValueAtTime(.001,ctx.currentTime+.3);osc.stop(ctx.currentTime+.3)}catch(e){}}

// Config panel
document.getElementById("live-toggle").onclick=function(){var p=document.getElementById("config-panel");p.classList.toggle("open");if(p.classList.contains("open")){document.getElementById("cfg-topic").value=ntfyTopic||"stackryn-cc-nick";document.getElementById("helper-topic").textContent=ntfyTopic||"stackryn-cc-nick"}};
document.getElementById("cfg-topic").oninput=function(){document.getElementById("helper-topic").textContent=this.value.trim()||"your-topic"};
document.getElementById("cfg-save").onclick=function(){ntfyTopic=document.getElementById("cfg-topic").value.trim();saveNtfy();document.getElementById("config-panel").classList.remove("open");connectNtfy()};
document.getElementById("cfg-cancel").onclick=function(){document.getElementById("config-panel").classList.remove("open")};
document.getElementById("helper-cmd").onclick=function(){copyText('curl -d "ChatName|Question" ntfy.sh/'+(ntfyTopic||"your-topic"))};
document.addEventListener("click",function(e){var p=document.getElementById("config-panel"),t=document.getElementById("live-toggle");if(p.classList.contains("open")&&!p.contains(e.target)&&!t.contains(e.target))p.classList.remove("open")});

// --- Init ---
load();loadMetrics();loadNtfy();
if(!ntfyTopic){var dt=document.getElementById("cfg-topic").value.trim();if(dt){ntfyTopic=dt;saveNtfy()}}
render();checkAutoTimer();
if(ntfyTopic)connectNtfy();
</script>
